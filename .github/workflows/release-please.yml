name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          # TODO: Remove release-as after 6.0.0-beta.1 is published
          release-as: 6.0.0-beta.2

  # Publish to npm when a release is created
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q "beta\|alpha\|rc"; then
            pnpm publish --no-git-checks --tag beta
          else
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publish
        run: |
          echo "Waiting for npm registry to propagate..."
          sleep 30
          EXPECTED_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view @cj-tech-master/excelts@${EXPECTED_VERSION} version 2>/dev/null || echo "NOT_FOUND")
          if [ "$PUBLISHED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: Expected version ${EXPECTED_VERSION} but found ${PUBLISHED_VERSION} on npm registry"
            exit 1
          fi
          echo "Verified: @cj-tech-master/excelts@${EXPECTED_VERSION} is live on npm"
